<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 - 联机对战</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; text-align: center; backdrop-filter: blur(10px); }
        h1 { color: #00d4ff; font-size: 36px; margin-bottom: 20px; }
        .menu { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; color: #fff; background: linear-gradient(135deg, #00d4ff, #0099cc); }
        .btn:hover { transform: translateY(-2px); }
        .btn-danger { background: linear-gradient(135deg, #f44336, #d32f2f); }
        input { padding: 12px 16px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; font-size: 16px; text-align: center; text-transform: uppercase; letter-spacing: 2px; width: 150px; outline: none; }
        input::placeholder { color: rgba(255,255,255,0.5); }
        #status { color: #fff; font-size: 18px; font-weight: 600; margin: 15px 0; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 12px; }
        #roomDisplay { color: #00d4ff; font-size: 20px; font-weight: 700; margin: 15px 0; display: none; }
        canvas { border-radius: 12px; cursor: pointer; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 五子棋</h1>
        <div class="menu">
            <button class="btn" onclick="createRoom()">创建房间</button>
            <input type="text" id="roomInput" placeholder="房间号" maxlength="6">
            <button class="btn" onclick="joinRoom()">加入房间</button>
        </div>
        <div id="roomDisplay"></div>
        <div id="status">点击"创建房间"开始</div>
        <canvas id="gameBoard"></canvas>
    </div>
    <script src="game.js"></script>
</body>
</html>
