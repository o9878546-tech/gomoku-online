<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线五子棋 - 联机对战</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎮 在线五子棋</h1>

        <!-- 房间控制 -->
        <div class="room-controls">
            <button id="createRoom" class="btn btn-primary">创建房间</button>
            <div class="join-section">
                <input type="text" id="roomIdInput" placeholder="输入房间ID" maxlength="6">
                <button id="joinRoom" class="btn btn-secondary">加入房间</button>
            </div>
        </div>

        <!-- 游戏信息 -->
        <div class="game-info">
            <div id="roomIdDisplay" class="room-id">房间ID: 等待创建...</div>
            <div id="status" class="status">请创建或加入房间开始游戏</div>
            <div id="currentPlayer" class="current-player"></div>
        </div>

        <!-- 游戏棋盘 -->
        <div class="board-container">
            <canvas id="board" width="600" height="600"></canvas>
        </div>

        <!-- 游戏控制 -->
        <div class="game-controls">
            <button id="restart" class="btn btn-danger" style="display: none;">重新开始</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
